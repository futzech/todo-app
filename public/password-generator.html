<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body class="generator-page">
    <div class="container">
        <div class="glass-card generator-card">
            <!-- Header -->
            <div class="logo">
                <h1>Password Generator</h1>
            </div>

            <!-- Password Display -->
            <div id="passwordDisplay" class="password-display">
                Click Generate Secure Password
            </div>

            <div class="copy-section">
                <button id="copyBtn" class="btn-copy btn-secondary">Copy Password</button>
                <span id="copyStatus" class="copy-status"></span>
            </div>

            <!-- Controls -->
            <div class="controls-grid">
                <div class="slider-group">
                    <label>Password Length</label>
                    <input type="range" class="slider" id="lengthSlider" min="6" max="20" value="12">
                    <div class="length-display" id="lengthDisplay">12</div>
                </div>
            </div>

            <!-- Generate Button -->
            <button id="generateBtn" class="btn-primary generate-btn">
                Generate Secure Password
            </button>

            <!-- Navigation -->
            <div style="margin-top: 2rem; padding-top: 1.5rem; text-align: center;">
                <a href="register.html" class="switch-link">← Back to register</a>
            </div>
        </div>
    </div>

    <script src="password-generator.js"></script>
</body>

</html>
