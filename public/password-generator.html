<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор паролей | Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">
  <div class="app-container">
    <header class="app-header">
      <div class="header-left">
        <a href="/dashboard.html" class="back-link">← Dashboard</a>
        <h1 class="logo">Генератор паролей</h1>
      </div>
      <button id="logoutBtn" class="btn-logout">Выход</button>
    </header>

    <main class="main-content">
      <section class="tool-section">
        <div class="glass-card large">
          <div class="generator-section">

            <div id="passwordDisplay" class="password-box">
              Нажмите "Сгенерировать" для создания пароля
            </div>

            <div class="copy-controls">
              <button id="copyBtn" class="btn-copy">
                 Скопировать
              </button>
              <span id="copyStatus" class="copy-status"></span>
            </div>

            <div class="settings-grid">
              <div class="setting-group">
                <label>Длина пароля</label>
                <div class="slider-container">
                  <input type="range" class="slider" id="lengthSlider" min="8" max="64" value="16">
                  <span id="lengthDisplay" class="length-value">16</span>
                </div>
              </div>
              
              <div class="checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="includeUppercase" checked>
                  <span class="checkmark"></span>
                  Заглавные (ABC)
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="includeLowercase" checked>
                  <span class="checkmark"></span>
                  строчные (abc)
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="includeNumbers" checked>
                  <span class="checkmark"></span>
                  цифры (123)
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="includeSymbols" checked>
                  <span class="checkmark"></span>
                  символы (!@#)
                </label>
              </div>
            </div>


            <button id="generateBtn" class="btn-primary large">
               Сгенерировать безопасный пароль
            </button>

            <div id="strengthIndicator" class="strength-indicator">
              <div class="strength-bar">
                <div class="strength-fill"></div>
              </div>
              <span class="strength-text">Выберите настройки</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="password-generator.js"></script>
</body>
</html>
